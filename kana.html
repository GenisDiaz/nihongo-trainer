<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1F3A5F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Kana" />
<title>Kana Trainer</title>
<style>
:root{
  --paper:#F3EEE1; --paper-2:#EAE3D2; --sumi:#211E1A; --sumi-soft:#5E574B;
  --ai:#1F3A5F; --ai-2:#2E5486; --matcha:#5F7346; --bengara:#A8452F;
  --guide:#CFC6AE; --line:#D9D1BE;
  --mincho:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Songti SC","MS Mincho",serif;
  --sans:"Helvetica Neue","Hiragino Kaku Gothic ProN",Arial,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--sans); color:var(--sumi); background:var(--paper);
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:26px 26px; background-position:center;
  -webkit-tap-highlight-color:transparent;
}
.kt-root{max-width:560px;margin:0 auto;padding:20px 18px calc(14px + env(safe-area-inset-bottom));
  min-height:100%;border-left:1px solid var(--line);border-right:1px solid var(--line);}
.kt-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.kt-brand{display:flex;gap:12px;align-items:center;}
.kt-logo{font-family:var(--mincho);font-size:34px;color:var(--ai);line-height:1;
  border:2px solid var(--ai);padding:6px 8px;border-radius:4px;background:var(--paper);}
.kt-brand h1{font-family:var(--mincho);font-size:22px;letter-spacing:.5px;}
.kt-brand p{margin-top:2px;font-size:12.5px;color:var(--sumi-soft);}
.kt-tabs{display:flex;gap:4px;background:var(--paper-2);padding:3px;border-radius:8px;}
.kt-tabs button{border:0;background:transparent;font:600 13px var(--sans);color:var(--sumi-soft);
  padding:7px 14px;border-radius:6px;cursor:pointer;}
.kt-tabs button.on{background:var(--paper);color:var(--ai);box-shadow:0 1px 2px rgba(0,0,0,.08);}

.kt-controls{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:16px 0 8px;flex-wrap:wrap;}
.kt-chips{display:flex;gap:6px;flex-wrap:wrap;}
.kt-chip{border:1px solid var(--line);background:var(--paper);color:var(--sumi-soft);
  font:600 12.5px var(--sans);padding:6px 11px;border-radius:20px;cursor:pointer;transition:.15s;}
.kt-chip.on{background:var(--ai);border-color:var(--ai);color:#fff;}
.kt-meter{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--sumi-soft);}
.kt-meter-track{width:90px;height:6px;background:var(--paper-2);border-radius:4px;overflow:hidden;}
.kt-meter-fill{height:100%;background:var(--matcha);border-radius:4px;transition:width .4s;}

.kt-drill{display:flex;flex-direction:column;align-items:center;padding:14px 0 4px;}
.kt-cell{position:relative;width:200px;height:200px;background:var(--paper);
  border:2px solid var(--ai);border-radius:6px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 0 rgba(31,58,95,.12);transition:.2s;}
.kt-guide-v,.kt-guide-h{position:absolute;pointer-events:none;}
.kt-guide-v{width:1px;height:100%;left:50%;background-image:linear-gradient(180deg,var(--guide) 50%,transparent 0);background-size:1px 8px;}
.kt-guide-h{height:1px;width:100%;top:50%;background-image:linear-gradient(90deg,var(--guide) 50%,transparent 0);background-size:8px 1px;}
.kt-kana{font-family:var(--mincho);font-size:118px;line-height:1;color:var(--sumi);animation:settle .35s ease;}
@keyframes settle{from{opacity:0;transform:translateY(-6px) scale(.96);filter:blur(2px);}to{opacity:1;transform:none;filter:none;}}
.kt-cell.kt-right{border-color:var(--matcha);box-shadow:0 4px 0 rgba(95,115,70,.2);background:#EEF1E6;}
.kt-cell.kt-wrong{border-color:var(--bengara);box-shadow:0 4px 0 rgba(168,69,47,.2);animation:shake .3s;}
@keyframes shake{10%,90%{transform:translateX(-2px);}30%,70%{transform:translateX(4px);}50%{transform:translateX(-4px);}}

.kt-answer{margin-top:18px;width:100%;max-width:320px;text-align:center;min-height:104px;}
.kt-input{width:100%;font:600 22px var(--sans);text-align:center;padding:12px;border:1px solid var(--line);
  border-radius:8px;background:var(--paper);color:var(--sumi);outline:none;letter-spacing:1px;}
.kt-input:focus{border-color:var(--ai);box-shadow:0 0 0 3px rgba(31,58,95,.12);}
.kt-btns{display:flex;gap:8px;margin-top:10px;}
.kt-primary{flex:1;border:0;background:var(--ai);color:#fff;font:600 15px var(--sans);padding:11px;border-radius:8px;cursor:pointer;}
.kt-primary:hover{background:var(--ai-2);}
.kt-ghost{border:1px solid var(--line);background:transparent;color:var(--sumi-soft);font:600 14px var(--sans);padding:11px 14px;border-radius:8px;cursor:pointer;}
.kt-fb{font-family:var(--mincho);font-size:26px;margin:14px 0 6px;}
.kt-fb-ok{color:var(--matcha);}
.kt-fb-no{color:var(--bengara);font-size:30px;}
.kt-fb-no b{border-bottom:2px solid var(--bengara);}
.kt-hint{font-size:13.5px;color:var(--sumi-soft);margin:4px 0;}
.kt-conf{font-size:13px;color:var(--ai);font-weight:600;margin:2px 0 12px;}
.kt-fb-wrap .kt-primary{max-width:200px;margin:0 auto;}

.kt-stats{display:flex;gap:8px;margin-top:22px;width:100%;max-width:360px;}
.kt-stat{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:9px 4px;text-align:center;}
.kt-stat b{display:block;font-family:var(--mincho);font-size:22px;color:var(--ai);}
.kt-stat span{font-size:11px;color:var(--sumi-soft);text-transform:uppercase;letter-spacing:.5px;}
.kt-empty{color:var(--sumi-soft);padding:40px 0;text-align:center;}

.kt-chart-hint{font-size:12.5px;color:var(--sumi-soft);text-align:center;margin:10px 0 14px;}
.kt-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
.kt-tile{position:relative;aspect-ratio:1;border:1px solid var(--line);border-radius:6px;background:var(--paper);
  cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;overflow:hidden;}
.kt-tile-kana{font-family:var(--mincho);font-size:26px;color:var(--sumi);}
.kt-tile-r{position:absolute;bottom:3px;right:5px;font-size:10px;color:var(--sumi-soft);opacity:0;transition:.15s;}
.kt-tile.flip .kt-tile-r{opacity:1;}
.kt-tile.lvl-weak{background:#F6E4DF;border-color:#E4B6AA;}
.kt-tile.lvl-mid{background:#F6EFD6;border-color:#E0D19C;}
.kt-tile.lvl-strong{background:#E6EEDD;border-color:#B4C79D;}
.kt-legend{display:flex;justify-content:center;gap:14px;margin-top:14px;font-size:11.5px;color:var(--sumi-soft);flex-wrap:wrap;}
.kt-legend span{display:flex;align-items:center;gap:5px;}
.kt-legend i{width:11px;height:11px;border-radius:3px;display:inline-block;}
.i-new{background:var(--paper-2);border:1px solid var(--line);}
.i-weak{background:#E4B6AA;} .i-mid{background:#E0D19C;} .i-strong{background:#B4C79D;}

.kt-foot{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:12px;
  border-top:1px solid var(--line);font-size:11.5px;}
.kt-export-btn{border:0;background:transparent;color:var(--ai);font:600 11.5px var(--sans);cursor:pointer;text-decoration:underline;}
.kt-reset{border:0;background:transparent;color:var(--bengara);font:600 11.5px var(--sans);cursor:pointer;text-decoration:underline;}

.kt-modal{position:fixed;inset:0;background:rgba(33,30,26,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
.kt-modal-box{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:20px;max-width:440px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25);}
.kt-modal-box h3{font-family:var(--mincho);margin-bottom:6px;font-size:19px;}
.kt-modal-box p{margin-bottom:12px;font-size:13px;color:var(--sumi-soft);line-height:1.45;}
.kt-export-area{width:100%;height:190px;font:12.5px/1.5 ui-monospace,Menlo,monospace;padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--paper-2);color:var(--sumi);resize:vertical;}
.kt-modal-btns{display:flex;gap:8px;margin-top:12px;}
.kt-modal-btns .kt-primary{flex:1;}

@media (max-width:420px){
  .kt-cell{width:170px;height:170px;} .kt-kana{font-size:96px;}
  .kt-grid{gap:5px;} .kt-tile-kana{font-size:22px;}
}
@media (prefers-reduced-motion:reduce){.kt-kana,.kt-cell.kt-wrong{animation:none;}}
</style>
</head>
<body>
<div class="kt-root">
  <header class="kt-head">
    <div class="kt-brand">
      <span class="kt-logo">仮名</span>
      <div><h1>Kana Trainer</h1><p>Escribe el sonido. Repite lo que fallas.</p></div>
    </div>
    <nav class="kt-tabs" id="tabs">
      <button data-view="drill">Practicar</button>
      <button data-view="chart">Tabla</button>
    </nav>
  </header>

  <div class="kt-controls">
    <div class="kt-chips" id="chips">
      <button class="kt-chip" data-s="hira">ひ Hiragana</button>
      <button class="kt-chip" data-s="kata">カ Katakana</button>
      <button class="kt-chip" data-s="daku">+ dakuten</button>
    </div>
    <div class="kt-meter"><div class="kt-meter-track"><div class="kt-meter-fill" id="meter"></div></div><span id="meter-label"></span></div>
  </div>

  <main id="main"></main>

  <footer class="kt-foot">
    <button class="kt-export-btn" id="export-btn">Exportar para Claude</button>
    <button class="kt-reset" id="reset-btn">Reiniciar progreso</button>
  </footer>
</div>
<div id="modal-root"></div>

<script>
(function(){
  "use strict";

  var HIRA_BASE=[["あ","a"],["い","i"],["う","u"],["え","e"],["お","o"],["か","ka"],["き","ki"],["く","ku"],["け","ke"],["こ","ko"],["さ","sa"],["し","shi"],["す","su"],["せ","se"],["そ","so"],["た","ta"],["ち","chi"],["つ","tsu"],["て","te"],["と","to"],["な","na"],["に","ni"],["ぬ","nu"],["ね","ne"],["の","no"],["は","ha"],["ひ","hi"],["ふ","fu"],["へ","he"],["ほ","ho"],["ま","ma"],["み","mi"],["む","mu"],["め","me"],["も","mo"],["や","ya"],["ゆ","yu"],["よ","yo"],["ら","ra"],["り","ri"],["る","ru"],["れ","re"],["ろ","ro"],["わ","wa"],["を","wo"],["ん","n"]];
  var HIRA_DAKU=[["が","ga"],["ぎ","gi"],["ぐ","gu"],["げ","ge"],["ご","go"],["ざ","za"],["じ","ji"],["ず","zu"],["ぜ","ze"],["ぞ","zo"],["だ","da"],["ぢ","ji"],["づ","zu"],["で","de"],["ど","do"],["ば","ba"],["び","bi"],["ぶ","bu"],["べ","be"],["ぼ","bo"],["ぱ","pa"],["ぴ","pi"],["ぷ","pu"],["ぺ","pe"],["ぽ","po"]];
  var KATA_BASE=[["ア","a"],["イ","i"],["ウ","u"],["エ","e"],["オ","o"],["カ","ka"],["キ","ki"],["ク","ku"],["ケ","ke"],["コ","ko"],["サ","sa"],["シ","shi"],["ス","su"],["セ","se"],["ソ","so"],["タ","ta"],["チ","chi"],["ツ","tsu"],["テ","te"],["ト","to"],["ナ","na"],["ニ","ni"],["ヌ","nu"],["ネ","ne"],["ノ","no"],["ハ","ha"],["ヒ","hi"],["フ","fu"],["ヘ","he"],["ホ","ho"],["マ","ma"],["ミ","mi"],["ム","mu"],["メ","me"],["モ","mo"],["ヤ","ya"],["ユ","yu"],["ヨ","yo"],["ラ","ra"],["リ","ri"],["ル","ru"],["レ","re"],["ロ","ro"],["ワ","wa"],["ヲ","wo"],["ン","n"]];
  var KATA_DAKU=[["ガ","ga"],["ギ","gi"],["グ","gu"],["ゲ","ge"],["ゴ","go"],["ザ","za"],["ジ","ji"],["ズ","zu"],["ゼ","ze"],["ゾ","zo"],["ダ","da"],["ヂ","ji"],["ヅ","zu"],["デ","de"],["ド","do"],["バ","ba"],["ビ","bi"],["ブ","bu"],["ベ","be"],["ボ","bo"],["パ","pa"],["ピ","pi"],["プ","pu"],["ペ","pe"],["ポ","po"]];

  var VARIANTS={shi:["shi","si"],chi:["chi","ti"],tsu:["tsu","tu"],fu:["fu","hu"],wo:["wo","o"],ji:["ji","zi","di"],zu:["zu","du"],n:["n","nn"]};
  function accepted(r){return VARIANTS[r]||[r];}

  var CONFUSE={"れ":"れ re · ろ ro · る ru","ろ":"れ re · ろ ro · る ru","る":"れ re · ろ ro · る ru","ぬ":"ぬ nu · め me","め":"ぬ nu · め me","さ":"さ sa · き ki · ち chi","き":"さ sa · き ki · ち chi","ち":"さ sa · き ki · ち chi","は":"は ha · ほ ho · ま ma","ほ":"は ha · ほ ho · ま ma","ま":"は ha · ほ ho · ま ma","い":"い i · り ri","り":"い i · り ri","す":"す su · む mu","む":"す su · む mu","わ":"わ wa · れ re · ね ne","ね":"わ wa · れ re · ね ne","シ":"シ shi · ツ tsu","ツ":"シ shi · ツ tsu","ソ":"ソ so · ン n · ノ no","ン":"ソ so · ン n · ノ no","ノ":"ソ so · ン n · ノ no"};
  var MNEMO={"ぬ":"fideos enrollados → nuudles","め":"como ぬ pero sin el lazo del final","れ":"una piernita que patea a la derecha","ろ":"solo la curva pelada, una carretera (road)","る":"la curva con un bucle al final (loop)","す":"un lazo que cuelga. NO es 'desu'","む":"una vaca: muuu","き":"una llave (key)","も":"anzuelo con más peces (more)","ふ":"el monte Fuji visto de lado","ほ":"は con una rayita extra arriba","そ":"un zigzag cosido (sew)","ね":"la cola rizada de un gato (neko)","わ":"la más simple de la familia con palito","う":"una cara de perfil con piquito arriba","え":"un pájaro de un trazo, SIN palito a la izquierda","ゆ":"parece un pez → nadas con los peces (yu)","よ":"un yo-yo colgando de su cuerda","シ":"trazos que suben →, sonrisa","ツ":"trazos que bajan →, dos gotas","ソ":"una sola gota que baja","ン":"una gota casi horizontal","ノ":"un solo trazo diagonal"};

  var KEY="kana-trainer-v1";
  var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function load(){ try{ var r=localStorage.getItem(KEY); return r?JSON.parse(r):{}; }catch(e){ return {}; } }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state.boxes)); }catch(e){} }

  var state={ scripts:{hira:true,kata:false}, daku:false, view:"drill",
    boxes:load(), session:{seen:0,ok:0,streak:0,best:0},
    current:null, status:"idle", lastChar:null, flips:{} };

  function deck(){
    var d=[];
    if(state.scripts.hira){ d=d.concat(HIRA_BASE); if(state.daku) d=d.concat(HIRA_DAKU); }
    if(state.scripts.kata){ d=d.concat(KATA_BASE); if(state.daku) d=d.concat(KATA_DAKU); }
    return d.map(function(x){return {k:x[0],r:x[1]};});
  }
  function norm(s){ return (s||"").trim().toLowerCase().replace(/\s+/g,""); }

  function pickNext(){
    var d=deck(); if(!d.length){ state.current=null; return; }
    var w=d.map(function(c){
      var st=state.boxes[c.k], box=st?st.box:0, weight=Math.pow(6-box,2)+1;
      if(!st) weight+=8; if(c.k===state.lastChar) weight=0.01;
      return {c:c,w:weight};
    });
    var total=w.reduce(function(s,x){return s+x.w;},0), r=Math.random()*total;
    for(var i=0;i<w.length;i++){ r-=w[i].w; if(r<=0){ state.current=w[i].c; return; } }
    state.current=w[w.length-1].c;
  }

  function grade(correct){
    var c=state.current, st=state.boxes[c.k]||{box:0,seen:0,ok:0};
    state.boxes[c.k]={ box: correct?Math.min(5,st.box+1):0, seen:st.seen+1, ok:st.ok+(correct?1:0) };
    save();
    var s=state.session, streak=correct?s.streak+1:0;
    state.session={ seen:s.seen+1, ok:s.ok+(correct?1:0), streak:streak, best:Math.max(s.best,streak) };
  }

  function submit(){
    if(!state.current||state.status!=="idle") return;
    var el=document.getElementById("kt-input"), val=el?el.value:"";
    var correct=accepted(state.current.r).indexOf(norm(val))>-1;
    state.lastChar=state.current.k; grade(correct);
    state.status=correct?"right":"wrong"; render();
    if(correct) setTimeout(next, reduced?250:650);
  }
  function reveal(){
    if(!state.current||state.status!=="idle") return;
    state.lastChar=state.current.k; grade(false); state.status="wrong"; render();
  }
  function next(){ state.status="idle"; pickNext(); render(); }

  // ---- rendering ----
  function mastered(){ return deck().filter(function(c){ return (state.boxes[c.k]&&state.boxes[c.k].box>=4); }).length; }

  function renderChrome(){
    var d=deck(), m=mastered(), pct=d.length?Math.round(m/d.length*100):0;
    document.getElementById("meter").style.width=pct+"%";
    document.getElementById("meter-label").textContent=pct+"% dominado";
    var chips=document.getElementById("chips").children;
    chips[0].className="kt-chip"+(state.scripts.hira?" on":"");
    chips[1].className="kt-chip"+(state.scripts.kata?" on":"");
    chips[2].className="kt-chip"+(state.daku?" on":"");
    var tabs=document.getElementById("tabs").children;
    tabs[0].className=state.view==="drill"?"on":"";
    tabs[1].className=state.view==="chart"?"on":"";
  }

  function drillHTML(){
    if(!state.current) return '<p class="kt-empty">Elige al menos un silabario arriba para empezar.</p>';
    var c=state.current, s=state.session, acc=s.seen?Math.round(s.ok/s.seen*100):null;
    var cell='<div class="kt-cell kt-'+state.status+'"><span class="kt-guide-v"></span><span class="kt-guide-h"></span><span class="kt-kana">'+c.k+'</span></div>';
    var ans='<div class="kt-answer">';
    if(state.status==="idle"){
      ans+='<input id="kt-input" class="kt-input" placeholder="rōmaji…" autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="off" />'
         +'<div class="kt-btns"><button class="kt-primary" id="check">Comprobar</button><button class="kt-ghost" id="dunno">No me acuerdo</button></div>';
    } else if(state.status==="right"){
      ans+='<p class="kt-fb kt-fb-ok">正解 · '+c.r+'</p>';
    } else {
      ans+='<div class="kt-fb-wrap"><p class="kt-fb kt-fb-no">'+c.k+' = <b>'+c.r+'</b></p>';
      if(MNEMO[c.k]) ans+='<p class="kt-hint">💡 '+MNEMO[c.k]+'</p>';
      if(CONFUSE[c.k]) ans+='<p class="kt-conf">ojo: '+CONFUSE[c.k]+'</p>';
      ans+='<button class="kt-primary" id="cont">Siguiente</button></div>';
    }
    ans+='</div>';
    var stats='<div class="kt-stats">'
      +stat("Racha",s.streak)+stat("Mejor",s.best)+stat("Aciertos",acc===null?"—":acc+"%")+stat("Vistas",s.seen)+'</div>';
    return '<div class="kt-drill">'+cell+ans+stats+'</div>';
  }
  function stat(label,val){ return '<div class="kt-stat"><b>'+val+'</b><span>'+label+'</span></div>'; }

  function level(k){ var st=state.boxes[k]; if(!st) return "new"; if(st.box>=4) return "strong"; if(st.box>=2) return "mid"; return "weak"; }
  function chartHTML(){
    var d=deck(), tiles="";
    for(var i=0;i<d.length;i++){ var c=d[i];
      tiles+='<button class="kt-tile lvl-'+level(c.k)+(state.flips[c.k]?" flip":"")+'" data-k="'+c.k+'"><span class="kt-tile-kana">'+c.k+'</span><span class="kt-tile-r">'+c.r+'</span></button>';
    }
    return '<p class="kt-chart-hint">Toca un carácter para verlo. El color marca cuánto lo dominas.</p>'
      +'<div class="kt-grid">'+tiles+'</div>'
      +'<div class="kt-legend"><span><i class="i-new"></i>sin ver</span><span><i class="i-weak"></i>flojo</span><span><i class="i-mid"></i>a medias</span><span><i class="i-strong"></i>dominado</span></div>';
  }

  function render(){
    renderChrome();
    var main=document.getElementById("main");
    main.innerHTML = state.view==="drill" ? drillHTML() : chartHTML();
    if(state.view==="drill"){
      var chk=document.getElementById("check"); if(chk) chk.onclick=submit;
      var dn=document.getElementById("dunno"); if(dn) dn.onclick=reveal;
      var ct=document.getElementById("cont"); if(ct) ct.onclick=next;
      var inp=document.getElementById("kt-input");
      if(inp){ inp.onkeydown=function(e){ if(e.key==="Enter") submit(); }; inp.focus(); }
      if(state.status==="wrong"){ document.onkeydown=function(e){ if(e.key==="Enter"){ document.onkeydown=null; next(); } }; }
    } else {
      var tl=main.querySelectorAll(".kt-tile");
      tl.forEach(function(b){ b.onclick=function(){ var k=b.getAttribute("data-k"); state.flips[k]=!state.flips[k]; b.classList.toggle("flip"); }; });
    }
  }

  // export
  function buildExport(){
    var d=deck(), cats={weak:[],mid:[],strong:[],unseen:[]};
    d.forEach(function(c){ var st=state.boxes[c.k];
      if(!st) cats.unseen.push(c.k);
      else if(st.box<=1) cats.weak.push(c.k+"("+c.r+")");
      else if(st.box<=3) cats.mid.push(c.k+"("+c.r+")");
      else cats.strong.push(c.k);
    });
    var sc=[state.scripts.hira?"hiragana":null,state.scripts.kata?"katakana":null].filter(Boolean).join("+")+(state.daku?" +dakuten":"");
    var m=mastered(), pct=d.length?Math.round(m/d.length*100):0, s=state.session, acc=s.seen?Math.round(s.ok/s.seen*100):0;
    return ["KANA TRAINER — progreso de Genís","Silabarios: "+sc,"Dominado: "+pct+"% ("+m+"/"+d.length+")","",
      "DÉBILES ("+cats.weak.length+"): "+(cats.weak.join(" ")||"—"),
      "A MEDIAS ("+cats.mid.length+"): "+(cats.mid.join(" ")||"—"),
      "DOMINADOS ("+cats.strong.length+"): "+(cats.strong.join(" ")||"—"),
      "SIN VER ("+cats.unseen.length+"): "+(cats.unseen.join(" ")||"—"),"",
      "Sesión actual: "+s.seen+" vistas · "+acc+"% aciertos · mejor racha "+s.best].join("\n");
  }
  function openExport(){
    var txt=buildExport();
    var root=document.getElementById("modal-root");
    root.innerHTML='<div class="kt-modal" id="ov"><div class="kt-modal-box"><h3>Tu progreso</h3>'
      +'<p>Copia esto y pégaselo a Claude en el chat. Con eso adapta lo que practicáis.</p>'
      +'<textarea class="kt-export-area" id="exp" readonly></textarea>'
      +'<div class="kt-modal-btns"><button class="kt-primary" id="cp">Copiar</button><button class="kt-ghost" id="cl">Cerrar</button></div></div></div>';
    document.getElementById("exp").value=txt;
    document.getElementById("exp").onfocus=function(){ this.select(); };
    document.getElementById("cl").onclick=function(){ root.innerHTML=""; };
    document.getElementById("ov").onclick=function(e){ if(e.target.id==="ov") root.innerHTML=""; };
    document.getElementById("cp").onclick=function(){
      var b=this; if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(function(){ b.textContent="¡Copiado!"; setTimeout(function(){b.textContent="Copiar";},1500); }).catch(function(){ document.getElementById("exp").select(); }); }
      else { document.getElementById("exp").select(); document.execCommand&&document.execCommand("copy"); b.textContent="¡Copiado!"; }
    };
  }

  // wire static controls
  document.getElementById("chips").addEventListener("click",function(e){
    var b=e.target.closest(".kt-chip"); if(!b) return; var s=b.getAttribute("data-s");
    if(s==="daku"){ state.daku=!state.daku; }
    else{ var other=s==="hira"?"kata":"hira";
      if(state.scripts[s] && !state.scripts[other]) return; // no dejar ambos apagados
      state.scripts[s]=!state.scripts[s];
    }
    state.status="idle"; pickNext(); render();
  });
  document.getElementById("tabs").addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b) return; state.view=b.getAttribute("data-view");
    if(state.view==="drill" && !state.current) pickNext(); render();
  });
  document.getElementById("export-btn").onclick=openExport;
  document.getElementById("reset-btn").onclick=function(){
    if(!confirm("¿Borrar todo el progreso guardado?")) return;
    state.boxes={}; state.session={seen:0,ok:0,streak:0,best:0};
    try{ localStorage.removeItem(KEY); }catch(e){}
    pickNext(); render();
  };

  pickNext(); render();
})();
</script>
</body>
</html>
