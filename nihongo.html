<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1F3A5F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Nihongo" />
<title>Nihongo Trainer</title>
<style>
:root{
  --paper:#F3EEE1;--paper-2:#EAE3D2;--sumi:#211E1A;--sumi-soft:#5E574B;
  --ai:#1F3A5F;--ai-2:#2E5486;--matcha:#5F7346;--bengara:#A8452F;
  --guide:#CFC6AE;--line:#D9D1BE;
  --mincho:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Songti SC","MS Mincho",serif;
  --sans:"Helvetica Neue","Hiragino Kaku Gothic ProN",Arial,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--sans);color:var(--sumi);background:var(--paper);
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:26px 26px;background-position:center;-webkit-tap-highlight-color:transparent;}
.nt-root{max-width:560px;margin:0 auto;padding:20px 18px calc(14px + env(safe-area-inset-bottom));min-height:100%;border-left:1px solid var(--line);border-right:1px solid var(--line);}
.nt-head{display:flex;gap:12px;align-items:center;}
.nt-logo{font-family:var(--mincho);font-size:22px;color:var(--ai);line-height:1;border:2px solid var(--ai);padding:8px;border-radius:4px;background:var(--paper);white-space:nowrap;}
.nt-head h1{font-family:var(--mincho);font-size:21px;letter-spacing:.5px;}
.nt-head p{margin-top:2px;font-size:12.5px;color:var(--sumi-soft);}
.nt-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-top:14px;}
.nt-tabs button{border:1px solid var(--line);background:var(--paper);font:600 12.5px var(--sans);color:var(--sumi-soft);padding:7px 12px;border-radius:8px;cursor:pointer;}
.nt-tabs button.on{background:var(--ai);border-color:var(--ai);color:#fff;}
.nt-controls{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:14px 0 8px;flex-wrap:wrap;}
.nt-chips{display:flex;gap:6px;flex-wrap:wrap;}
.nt-chip{border:1px solid var(--line);background:var(--paper);color:var(--sumi-soft);font:600 12.5px var(--sans);padding:6px 12px;border-radius:20px;cursor:pointer;}
.nt-chip.on{background:var(--ai);border-color:var(--ai);color:#fff;}
.nt-hint-inline{font-size:12.5px;color:var(--sumi-soft);font-weight:600;}
.nt-meter{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--sumi-soft);}
.nt-meter-track{width:80px;height:6px;background:var(--paper-2);border-radius:4px;overflow:hidden;}
.nt-meter-fill{height:100%;background:var(--matcha);border-radius:4px;transition:width .4s;}
.nt-main{padding-top:12px;}
.nt-drill{display:flex;flex-direction:column;align-items:center;}
.nt-cell{position:relative;width:230px;height:180px;background:var(--paper);border:2px solid var(--ai);border-radius:6px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 rgba(31,58,95,.12);transition:.2s;padding:8px;}
.nt-guide-v{position:absolute;width:1px;height:100%;left:50%;background-image:linear-gradient(180deg,var(--guide) 50%,transparent 0);background-size:1px 8px;}
.nt-guide-h{position:absolute;height:1px;width:100%;top:50%;background-image:linear-gradient(90deg,var(--guide) 50%,transparent 0);background-size:8px 1px;}
.nt-jp{display:flex;flex-direction:column;align-items:center;gap:6px;animation:settle .35s ease;text-align:center;max-width:100%;}
.nt-kanji{font-family:var(--mincho);line-height:1.15;color:var(--sumi);max-width:100%;overflow-wrap:anywhere;}
.nt-read{font-family:var(--mincho);font-size:20px;color:var(--sumi-soft);}
.nt-prompt{font-family:var(--sans);font-size:26px;font-weight:600;color:var(--sumi);text-align:center;padding:0 12px;animation:settle .35s ease;line-height:1.3;}
@keyframes settle{from{opacity:0;transform:translateY(-6px) scale(.97);}to{opacity:1;transform:none;}}
.nt-cell.nt-right{border-color:var(--matcha);box-shadow:0 4px 0 rgba(95,115,70,.2);background:#EEF1E6;}
.nt-cell.nt-wrong{border-color:var(--bengara);box-shadow:0 4px 0 rgba(168,69,47,.2);animation:shake .3s;}
@keyframes shake{10%,90%{transform:translateX(-2px);}30%,70%{transform:translateX(4px);}50%{transform:translateX(-4px);}}
.nt-sentence{font-family:var(--mincho);font-size:29px;color:var(--sumi);background:var(--paper);border:2px solid var(--ai);border-radius:8px;padding:22px 18px;text-align:center;line-height:1.5;box-shadow:0 4px 0 rgba(31,58,95,.12);width:100%;max-width:420px;}
.nt-sentence.nt-right{border-color:var(--matcha);background:#EEF1E6;}
.nt-sentence.nt-wrong{border-color:var(--bengara);background:#F6E9E5;}
.nt-blank{display:inline-block;min-width:34px;color:var(--bengara);border-bottom:2px solid var(--bengara);margin:0 2px;font-weight:700;}
.nt-blank.filled{color:var(--matcha);border-color:var(--matcha);}
.nt-trans{font-size:14px;color:var(--sumi-soft);margin:12px 0 4px;text-align:center;font-style:italic;}
.nt-particles{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px;max-width:360px;}
.nt-pbtn{font-family:var(--mincho);font-size:26px;width:56px;height:56px;border:1px solid var(--line);background:var(--paper);color:var(--sumi);border-radius:10px;cursor:pointer;box-shadow:0 2px 0 rgba(31,58,95,.1);}
.nt-pbtn:active{transform:translateY(1px);box-shadow:none;}
.nt-answer{margin-top:18px;width:100%;max-width:320px;text-align:center;min-height:104px;}
.nt-input{width:100%;font:600 20px var(--sans);text-align:center;padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--sumi);outline:none;}
.nt-input:focus{border-color:var(--ai);box-shadow:0 0 0 3px rgba(31,58,95,.12);}
.nt-btns{display:flex;gap:8px;margin-top:10px;}
.nt-primary{flex:1;border:0;background:var(--ai);color:#fff;font:600 15px var(--sans);padding:11px;border-radius:8px;cursor:pointer;}
.nt-ghost{border:1px solid var(--line);background:transparent;color:var(--sumi-soft);font:600 14px var(--sans);padding:11px 14px;border-radius:8px;cursor:pointer;}
.nt-fb{font-family:var(--mincho);font-size:21px;margin:10px 0 6px;}
.nt-fb-ok{color:var(--matcha);}
.nt-fb-no{color:var(--bengara);}
.nt-fb-no b{border-bottom:2px solid var(--bengara);}
.nt-note{font-size:13.5px;color:var(--sumi-soft);margin:4px auto 12px;max-width:340px;line-height:1.5;}
.nt-fb-wrap{text-align:center;margin-top:14px;}
.nt-fb-wrap .nt-primary{max-width:200px;margin:0 auto;}
.nt-stats{display:flex;gap:8px;margin-top:22px;width:100%;max-width:360px;}
.nt-stat{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:9px 4px;text-align:center;}
.nt-stat b{display:block;font-family:var(--mincho);font-size:20px;color:var(--ai);}
.nt-stat span{font-size:10.5px;color:var(--sumi-soft);text-transform:uppercase;letter-spacing:.5px;}
.nt-modal{position:fixed;inset:0;background:rgba(33,30,26,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
.nt-modal-box{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:20px;max-width:440px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25);}
.nt-modal-box h3{font-family:var(--mincho);margin-bottom:6px;font-size:19px;}
.nt-modal-box p{margin-bottom:12px;font-size:13px;color:var(--sumi-soft);line-height:1.45;}
.nt-export-area{width:100%;height:200px;font:12.5px/1.5 ui-monospace,Menlo,monospace;padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--paper-2);color:var(--sumi);resize:vertical;}
.nt-modal-btns{display:flex;gap:8px;margin-top:12px;}
.nt-modal-btns .nt-primary{flex:1;}
.nt-foot{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;}
.nt-export-btn{border:0;background:transparent;color:var(--ai);font:600 11.5px var(--sans);cursor:pointer;text-decoration:underline;}
.nt-reset{border:0;background:transparent;color:var(--bengara);font:600 11.5px var(--sans);cursor:pointer;text-decoration:underline;}
@media (max-width:420px){.nt-cell{width:200px;height:165px;}.nt-sentence{font-size:24px;}.nt-pbtn{width:50px;height:50px;font-size:23px;}.nt-prompt{font-size:22px;}}
@media (prefers-reduced-motion:reduce){.nt-jp,.nt-prompt,.nt-cell.nt-wrong{animation:none;}}
</style>
</head>
<body>
<div class="nt-root">
  <header class="nt-head">
    <span class="nt-logo">日本語</span>
    <div><h1>Nihongo Trainer</h1><p>Refuerza lo básico para volar en clase.</p></div>

  <main class="nt-main" id="main"></main>
  <footer class="nt-foot">
    <button class="nt-export-btn" id="export-btn">Exportar para Claude</button>
    <button class="nt-reset" id="reset-btn">Reiniciar progreso</button>

</div>

 {id:"ct10",kana:"とお",romaji:"too",alt:["to","tou"],es:["10 cosas","diez cosas"],esPrompt:"10 cosas · 十",note:"⚠ とお, sin つ. De 11 en adelante: じゅう + 個 (こ)."},
 {id:"ctq",kana:"いくつ",romaji:"ikutsu",es:["cuantos","cuantas cosas"],esPrompt:"¿cuántos? · いくつ",note:"También «¿qué edad?»."}
];
var QUESTIONS=[
 {id:"qw1",kana:"なに",romaji:"nani",es:["que"],esPrompt:"qué (con partícula: 何を／何が) · 何",note:"なに + partícula. «Con conector»: 何を, 何が."},
 {id:"qw2",kana:"なん",romaji:"nan",es:["que"],esPrompt:"qué (pegado: 何です／何時／何人) · 何",note:"なん antes de です y contadores. «Sin conector»."},
 {id:"qw3",kana:"だれ",romaji:"dare",es:["quien","quienes"],esPrompt:"quién · 誰",note:"Versión educada: どなた."},
 {id:"qw4",kana:"どこ",romaji:"doko",es:["donde"],esPrompt:"dónde · どこ",note:"Educado: どちら."},
 {id:"qw5",kana:"いつ",romaji:"itsu",es:["cuando"],esPrompt:"cuándo · いつ",note:"No lleva partícula に: いつ来ますか."},
 {id:"qw6",kana:"いくつ",romaji:"ikutsu",es:["cuantos","cuantas cosas"],esPrompt:"cuántos (cantidad) · いくつ",note:"También «¿qué edad?». Contador genérico."},
 {id:"qw7",kana:"いくら",romaji:"ikura",es:["cuanto cuesta","cuanto","cuanto vale"],esPrompt:"cuánto cuesta (precio) · いくら",note:"いくらですか = ¿cuánto cuesta?"},
 {id:"qw8",kana:"どれ",romaji:"dore",es:["cual","cuales"],esPrompt:"¿cuál? (entre varios, va solo) · どれ",note:"Sin sustantivo detrás: どれですか."},
 {id:"qw9",kana:"どの",romaji:"dono",es:["cual","que"],esPrompt:"qué / cuál + sustantivo (どの本) · どの",note:"Siempre con sustantivo: どの本 = qué libro."},
 {id:"qw10",kana:"どんな",romaji:"donna",es:["que tipo de","que clase de","como es"],esPrompt:"qué tipo de · どんな",note:"どんな人 = qué tipo de persona."},
 {id:"qw11",kana:"どうして",romaji:"doushite",alt:["doushte"],es:["por que","porque"],esPrompt:"por qué (neutral) · どうして",note:"Neutral/educado. Pide la razón."},
 {id:"qw12",kana:"なんで",romaji:"nande",es:["por que","porque"],esPrompt:"por qué (coloquial) · 何で",note:"Informal, hablado. (Ojo: 何で también «¿con qué?».)"},
 {id:"qw13",kana:"どうやって",romaji:"douyatte",alt:["douyatte"],es:["como","de que manera"],esPrompt:"cómo (de qué manera) · どうやって",note:"Método/medio: どうやって行きますか = ¿cómo se va?"}
];
// para meses/dias/horas/minutos/verbos/numeros/contadores/preguntas, el "hero" es la propia lectura
MONTHS.concat(DAYS,HOURS,MINUTES,VERBS,NUMBERS,COUNTERS,QUESTIONS).forEach(function(c){c.kanji=c.kana;});

var DECKS={
 vocab:{label:"Pronombres",type:"cards",data:PRONOUNS},
 verbs:{label:"Verbos",type:"cards",data:VERBS},
 particles:{label:"Partículas",type:"particles",data:SENTENCES},
 questions:{label:"Preguntas",type:"cards",data:QUESTIONS},
 numbers:{label:"Números",type:"cards",data:NUMBERS},
 counters:{label:"Contadores",type:"cards",data:COUNTERS},
 months:{label:"Meses",type:"cards",data:MONTHS},
 days:{label:"Días",type:"cards",data:DAYS},
 hours:{label:"Horas",type:"cards",data:HOURS},
 minutes:{label:"Minutos",type:"cards",data:MINUTES}
};
var ORDER=["vocab","verbs","particles","questions","numbers","counters","months","days","hours","minutes"];
var KEY="nihongo-trainer-v1";
var reduced=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function load(){try{var r=localStorage.getItem(KEY);var p=r?JSON.parse(r):{};return{vocab:p.vocab||{},verbs:p.verbs||{},particles:p.particles||{},questions:p.questions||{},numbers:p.numbers||{},counters:p.counters||{},months:p.months||{},days:p.days||{},hours:p.hours||{},minutes:p.minutes||{}};}catch(e){return{vocab:{},verbs:{},particles:{},questions:{},numbers:{},counters:{},months:{},days:{},hours:{},minutes:{}};}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state.boxes));}catch(e){}}
function stripAcc(s){return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function normEs(s){return stripAcc((s||"").trim().toLowerCase()).replace(/[.!¿?,]/g,"");}
function normJp(s){return (s||"").trim().toLowerCase().replace(/\s+/g,"");}
function heroFont(s){var n=(s||"").length;return n<=2?76:n===3?58:n===4?48:n===5?40:n<=6?34:n<=8?28:n<=11?22:18;}

var state={mode:"vocab",dir:"jp_es",boxes:load(),session:{seen:0,ok:0,streak:0,best:0},current:null,qDir:"jp_es",status:"idle",picked:null,last:null};

function deck(){return DECKS[state.mode].data;}
function isCards(){return DECKS[state.mode].type==="cards";}
function mastered(){var b=state.boxes[state.mode]||{};return deck().filter(function(c){return (b[c.id]&&b[c.id].box>=4);}).length;}

function pickNext(){
 var b=state.boxes[state.mode]||{},d=deck();
 var w=d.map(function(c){var st=b[c.id],box=st?st.box:0,weight=Math.pow(6-box,2)+1;if(!st)weight+=8;if(c.id===state.last)weight=0.01;return{c:c,w:weight};});
 var total=w.reduce(function(s,x){return s+x.w;},0),r=Math.random()*total,chosen=w[w.length-1].c;
 for(var i=0;i<w.length;i++){r-=w[i].w;if(r<=0){chosen=w[i].c;break;}}
 state.current=chosen;
 if(isCards())state.qDir=state.dir==="mix"?(Math.random()<0.5?"jp_es":"es_jp"):state.dir;
}
function grade(correct){
 var b=state.boxes[state.mode]||{},st=b[state.current.id]||{box:0,seen:0,ok:0};
 b[state.current.id]={box:correct?Math.min(5,st.box+1):0,seen:st.seen+1,ok:st.ok+(correct?1:0)};
 state.boxes[state.mode]=b;save();
 var s=state.session,streak=correct?s.streak+1:0;
 state.session={seen:s.seen+1,ok:s.ok+(correct?1:0),streak:streak,best:Math.max(s.best,streak)};
}
function checkVocab(){
 if(!state.current||state.status!=="idle")return;
 var el=document.getElementById("nt-input"),val=el?el.value:"",c=state.current,correct;
 if(state.qDir==="jp_es")correct=c.es.map(normEs).indexOf(normEs(val))>-1;
 else{var acc=[normJp(c.romaji)].concat((c.alt||[]).map(normJp));correct=acc.indexOf(normJp(val))>-1||val.trim()===c.kana;}
 state.last=c.id;grade(correct);state.status=correct?"right":"wrong";render();
 if(correct)setTimeout(next,reduced?250:750);
}
function chooseParticle(p){
 if(!state.current||state.status!=="idle")return;
 var correct=state.current.ans.indexOf(p)>-1;state.picked=p;state.last=state.current.id;grade(correct);
 state.status=correct?"right":"wrong";render();if(correct)setTimeout(next,reduced?400:1100);
}
function revealVocab(){if(!state.current||state.status!=="idle")return;state.last=state.current.id;grade(false);state.status="wrong";render();}
function next(){state.status="idle";state.picked=null;pickNext();render();}

function chrome(){
 var tabs=document.getElementById("tabs");tabs.innerHTML="";
 ORDER.forEach(function(k){var b=document.createElement("button");b.textContent=DECKS[k].label;b.className=state.mode===k?"on":"";b.onclick=function(){state.mode=k;state.status=null;state.session={seen:0,ok:0,streak:0,best:0};state.status="idle";pickNext();render();};tabs.appendChild(b);});
 var left=document.getElementById("ctl-left");left.innerHTML="";
 if(isCards()){
  var wrap=document.createElement("div");wrap.className="nt-chips";
  [["jp_es","日→ES"],["es_jp","ES→日"],["mix","Mixto"]].forEach(function(o){var c=document.createElement("button");c.className="nt-chip"+(state.dir===o[0]?" on":"");c.textContent=o[1];c.onclick=function(){state.dir=o[0];state.status="idle";pickNext();render();};wrap.appendChild(c);});
  left.appendChild(wrap);
 } else { left.innerHTML='<div class="nt-hint-inline">Elige la partícula correcta</div>'; }
 var d=deck(),m=mastered(),pct=d.length?Math.round(m/d.length*100):0;
 document.getElementById("meter").style.width=pct+"%";
 document.getElementById("meter-label").textContent=pct+"%";
}
function statsHTML(){var s=state.session,acc=s.seen?Math.round(s.ok/s.seen*100):null;
 return '<div class="nt-stats"><div class="nt-stat"><b>'+s.streak+'</b><span>Racha</span></div><div class="nt-stat"><b>'+s.best+'</b><span>Mejor</span></div><div class="nt-stat"><b>'+(acc===null?"—":acc+"%")+'</b><span>Aciertos</span></div><div class="nt-stat"><b>'+s.seen+'</b><span>Vistas</span></div></div>';}

function render(){
 chrome();
 var main=document.getElementById("main"),c=state.current;
 if(!c){main.innerHTML="";return;}
 if(isCards()){
  var cell;
  if(state.qDir==="jp_es"){cell='<div class="nt-cell nt-'+state.status+'"><span class="nt-guide-v"></span><span class="nt-guide-h"></span><div class="nt-jp"><span class="nt-kanji" style="font-size:'+heroFont(c.kanji)+'px">'+c.kanji+'</span>'+(c.kanji!==c.kana?'<span class="nt-read">'+c.kana+'</span>':'')+'</div></div>';}
  else{cell='<div class="nt-cell nt-'+state.status+'"><span class="nt-guide-v"></span><span class="nt-guide-h"></span><span class="nt-prompt">'+c.esPrompt+'</span></div>';}
  var ans='<div class="nt-answer">';
  if(state.status==="idle"){ans+='<input id="nt-input" class="nt-input" placeholder="'+(state.qDir==="jp_es"?"en español…":"en rōmaji…")+'" autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="off"><div class="nt-btns"><button class="nt-primary" id="check">Comprobar</button><button class="nt-ghost" id="dunno">No lo sé</button></div>';}
  else if(state.status==="right"){ans+='<p class="nt-fb nt-fb-ok">正解 · '+c.kana+' = '+c.es[0]+'</p>';}
  else{ans+='<div class="nt-fb-wrap"><p class="nt-fb nt-fb-no">'+c.kana+' = <b>'+c.es[0]+'</b> · '+c.romaji+'</p>'+(c.note?'<p class="nt-note">💡 '+c.note+'</p>':'')+'<button class="nt-primary" id="cont">Siguiente</button></div>';}
  ans+='</div>';
  main.innerHTML='<div class="nt-drill">'+cell+ans+statsHTML()+'</div>';
  var chk=document.getElementById("check");if(chk)chk.onclick=checkVocab;
  var dn=document.getElementById("dunno");if(dn)dn.onclick=revealVocab;
  var ct=document.getElementById("cont");if(ct)ct.onclick=next;
  var inp=document.getElementById("nt-input");if(inp){inp.onkeydown=function(e){if(e.key==="Enter"){if(state.status==="idle")checkVocab();}};inp.focus();}
 } else {
  var sent='<div class="nt-sentence nt-'+state.status+'"><span>'+c.pre+'</span><span class="nt-blank '+(state.status!=="idle"?"filled":"")+'">'+(state.status==="idle"?"＿":(state.picked||c.ans[0]))+'</span><span>'+c.post+'</span></div><p class="nt-trans">'+c.es+'</p>';
  var body;
  if(state.status==="idle"){body='<div class="nt-particles">'+PARTICLE_OPTIONS.map(function(p){return '<button class="nt-pbtn" data-p="'+p+'">'+p+'</button>';}).join("")+'</div>';}
  else{var head=state.status==="right"?'<p class="nt-fb nt-fb-ok">正解 · '+c.ans.join(" / ")+'</p>':'<p class="nt-fb nt-fb-no">Era <b>'+c.ans.join(" / ")+'</b>'+(state.picked?', no '+state.picked:'')+'</p>';body='<div class="nt-fb-wrap">'+head+'<p class="nt-note">💡 '+c.exp+'</p><button class="nt-primary" id="cont">Siguiente</button></div>';}
  main.innerHTML='<div class="nt-drill">'+sent+body+statsHTML()+'</div>';
  main.querySelectorAll(".nt-pbtn").forEach(function(b){b.onclick=function(){chooseParticle(b.getAttribute("data-p"));};});
  var ct2=document.getElementById("cont");if(ct2)ct2.onclick=next;
 }
}

function buildExport(){
 var lines=["NIHONGO TRAINER — progreso de Genís",""];
 ORDER.forEach(function(k){var d=DECKS[k],b=state.boxes[k]||{},weak=[],strong=0;
  d.data.forEach(function(c){var box=b[c.id]?b[c.id].box:0;if(box>=4)strong++;else weak.push(d.type==="cards"?c.kana+"("+c.es[0]+")":c.ans.join("/")+":"+c.es);});
  lines.push(DECKS[k].label.toUpperCase()+" — dominados "+strong+"/"+d.data.length);
  lines.push("  Flojos: "+(weak.join(d.type==="cards"?" ":" · ")||"—"));lines.push("");});
 var s=state.session,acc=s.seen?Math.round(s.ok/s.seen*100):0;
 lines.push("Sesión actual ("+DECKS[state.mode].label+"): "+s.seen+" vistas · "+acc+"% aciertos · mejor racha "+s.best);
 return lines.join("\n");
}
document.getElementById("export-btn").onclick=function(){
 var txt=buildExport(),root=document.getElementById("modal-root");
 root.innerHTML='<div class="nt-modal" id="ov"><div class="nt-modal-box"><h3>Tu progreso</h3><p>Copia esto y pégaselo a Claude.</p><textarea class="nt-export-area" id="exp" readonly></textarea><div class="nt-modal-btns"><button class="nt-primary" id="cp">Copiar</button><button class="nt-ghost" id="cl">Cerrar</button></div></div></div>';
 document.getElementById("exp").value=txt;document.getElementById("exp").onfocus=function(){this.select();};
 document.getElementById("cl").onclick=function(){root.innerHTML="";};
 document.getElementById("ov").onclick=function(e){if(e.target.id==="ov")root.innerHTML="";};
 document.getElementById("cp").onclick=function(){var b=this;if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){b.textContent="¡Copiado!";setTimeout(function(){b.textContent="Copiar";},1500);}).catch(function(){document.getElementById("exp").select();});}else{document.getElementById("exp").select();b.textContent="¡Copiado!";}};
};
document.getElementById("reset-btn").onclick=function(){if(!confirm("¿Borrar TODO el progreso (todas las pestañas)?"))return;state.boxes={vocab:{},verbs:{},particles:{},questions:{},numbers:{},counters:{},months:{},days:{},hours:{},minutes:{}};state.session={seen:0,ok:0,streak:0,best:0};try{localStorage.removeItem(KEY);}catch(e){}pickNext();render();};

pickNext();render();
})();
</script>
</body>
</html>
